name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  js:
    name: JS/TS Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  php:
    name: PHP Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install Composer dependencies
        working-directory: plugin
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan
        working-directory: plugin
        run: composer phpstan

      - name: PHP_CodeSniffer
        working-directory: plugin
        run: composer phpcs